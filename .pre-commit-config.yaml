repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: main\.js$
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: main\.js$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [ts, json]
        exclude: main\.js$

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: node
        entry: npx eslint
        types: [ts]
        args: [--max-warnings=0]
        exclude: main\.js$
